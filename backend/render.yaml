services:
  - type: web
    name: cybershield-backend
    env: python
    region: oregon
    plan: starter  # upgrade if using Detoxify (needs more RAM)
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cybershield-db
          property: connectionString
      - key: USE_FALLBACK_AI
        value: "true"   # Set to "false" and upgrade plan to use real Detoxify
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
