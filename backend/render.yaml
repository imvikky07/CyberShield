services:
  - type: web
    name: cybershield-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    pythonVersion: 3.11   
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: postgresql://postgres:YOUR_PASSWORD@db.nutrbacfrbmemeahmxep.supabase.co:5432/postgres
      - key: USE_FALLBACK_AI
        value: "true"
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app